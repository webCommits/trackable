{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Login" %}{% endblock %}

{% block content %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">{% trans "Login" %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">{% trans "Username" %}</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">{% trans "Password" %}</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">{% trans "Log in" %}</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="/accounts/password-reset/">{% trans "Forgot your password?" %}</a>
    </p>

</div>
{% endblock %}
