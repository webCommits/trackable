{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Add holiday" %}{% endblock %}

{% block content %}
<div style="max-width:500px; margin:0 auto;">
    <a href="/org/holidays/" class="btn btn-secondary btn-sm" style="margin-bottom:20px;">← {% trans "Back to holidays" %}</a>
    <h1 style="color:var(--ctp-teal); margin-bottom:30px;">🎌 {% trans "Add holiday" %}</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.date.id_for_label }}">{% trans "Date" %}</label>
            {{ form.date }}
        </div>
        <div class="form-group">
            <label for="{{ form.name.id_for_label }}">{% trans "Holiday name" %}</label>
            {{ form.name }}
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">{% trans "Add holiday" %}</button>
    </form>
</div>
{% endblock %}
