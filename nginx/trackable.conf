# ─────────────────────────────────────────────────────────────────────────────
#  Nginx reverse-proxy config for trackable.
#
#  Usage:
#    sudo cp nginx/trackable.conf /etc/nginx/sites-available/trackable
#    # edit the three CHANGEME values below, then:
#    sudo ln -s /etc/nginx/sites-available/trackable /etc/nginx/sites-enabled/
#    sudo certbot --nginx -d your-domain.com -d www.your-domain.com
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting (define in http context / included before server blocks) ──
# If your nginx.conf already has a limit_req_zone, remove this line.
limit_req_zone $binary_remote_addr zone=trackable_ratelimit:10m rate=20r/s;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream trackable_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;  # CHANGEME

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;  # CHANGEME

    # ── SSL (certbot fills these in automatically) ──
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;  # CHANGEME
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;    # CHANGEME
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        always;

    # ── Gzip compression ──
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── Buffer / timeout tuning ──
    client_max_body_size   10M;
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;
    keepalive_timeout      65s;

    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;
    proxy_connect_timeout   5s;
    proxy_read_timeout      60s;
    proxy_send_timeout      60s;

    # ── Static files (served directly by Nginx, not Django) ──
    location /static/ {
        alias /opt/trackable/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        tcp_nodelay off;
        open_file_cache          max=1000 inactive=30s;
        open_file_cache_valid    60s;
        open_file_cache_min_uses 2;
        open_file_cache_errors   on;
    }

    # ── Django application ──
    location / {
        limit_req zone=trackable_ratelimit burst=50 nodelay;

        proxy_pass              http://trackable_app;
        proxy_http_version      1.1;
        proxy_set_header        Connection       "";
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_redirect          off;

        # Pass Django CSRF / session cookies through untouched
        proxy_pass_header       Set-Cookie;
    }

    # ── Hide Nginx version in error pages ──
    server_tokens off;

    # ── Logging ──
    access_log /var/log/nginx/trackable.access.log;
    error_log  /var/log/nginx/trackable.error.log warn;
}
