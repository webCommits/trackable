{% extends 'base.html' %}

{% block title %}Passwort zurücksetzen - Trackable{% endblock %}

{% block content %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">Passwort zurücksetzen</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="email" name="email" id="email" required placeholder="deine@email.de">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Reset-Link senden</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="/accounts/login/">Zurück zum Login</a>
    </p>
</div>
{% endblock %}
