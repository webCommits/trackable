{% extends 'base.html' %}

{% block title %}Passwort zurücksetzen - Trackable{% endblock %}

{% block content %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">Neues Passwort</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="password">Neues Passwort</label>
            <input type="password" name="password" id="password" required>
        </div>
        <div class="form-group">
            <label for="password_confirm">Passwort bestätigen</label>
            <input type="password" name="password_confirm" id="password_confirm" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Passwort ändern</button>
    </form>
</div>
{% endblock %}
