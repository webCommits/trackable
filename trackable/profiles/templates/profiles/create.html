{% extends 'base.html' %}

{% block title %}Profil erstellen - Trackable{% endblock %}

{% block content %}
<div class="content" style="max-width: 600px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">Neues Profil erstellen</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">Jobtitel</label>
            {{ form.title }}
        </div>
        <div class="form-group">
            <label for="{{ form.position.id_for_label }}">Stelle</label>
            {{ form.position }}
        </div>
        <div class="form-group">
            <label for="{{ form.address.id_for_label }}">Adresse (optional)</label>
            {{ form.address }}
        </div>
        <div class="form-group">
            <label for="{{ form.weekly_hours.id_for_label }}">Wochenstunden</label>
            {{ form.weekly_hours }}
        </div>
        <div class="form-group">
            <label for="{{ form.hourly_rate.id_for_label }}">Stundenlohn (€)</label>
            {{ form.hourly_rate }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Profil erstellen</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="/profiles/" class="btn btn-secondary">Abbrechen</a>
    </p>
</div>
{% endblock %}
