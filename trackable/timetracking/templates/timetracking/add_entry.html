{% extends 'base.html' %}

{% block title %}Zeit eintragen - {{ profile.title }}{% endblock %}

{% block content %}
<div class="content" style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 30px;">
        <a href="/profiles/{{ profile.id }}/" class="btn btn-secondary">← Zurück</a>
    </div>
    
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--ctp-mauve);">
        Zeit eintragen - {{ profile.title }}
    </h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.date.id_for_label }}">Datum</label>
            {{ form.date }}
        </div>
        <div class="form-group">
            <label for="{{ form.start_time.id_for_label }}">Startzeit</label>
            {{ form.start_time }}
        </div>
        <div class="form-group">
            <label for="{{ form.end_time.id_for_label }}">Endzeit</label>
            {{ form.end_time }}
        </div>
        <div class="form-group">
            <label for="{{ form.pause_duration.id_for_label }}">Pause (Stunden)</label>
            {{ form.pause_duration }}
            <small style="display: block; margin-top: 5px; color: var(--ctp-subtext0);">
                Standard: 0 Stunden
            </small>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">
            Zeit speichern
        </button>
    </form>
</div>
{% endblock %}
