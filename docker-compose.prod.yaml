version: '3.8'

services:
  app:
    build: .
    container_name: trackable-app
    volumes:
      - db_data:/app/data
    environment:
      - DJANGO_SETTINGS_MODULE=trackable.settings.prod
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - coolify
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py compilemessages &&
             gunicorn trackable.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped
  
  cron:
    build: .
    container_name: trackable-cron
    volumes:
      - db_data:/app/data
    environment:
      - DJANGO_SETTINGS_MODULE=trackable.settings.prod
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    user: root
    networks:
      - coolify
    command: cron -f -L /var/log/cron.log
    restart: unless-stopped
    depends_on:
      - app

volumes:
  db_data:
    driver: local

networks:
  coolify:
    external: true
